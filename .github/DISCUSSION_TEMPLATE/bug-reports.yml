name: Bug Report
description: Report a bug, crash, or unexpected behavior in Termina
title: "[Bug] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you provide, the faster we can fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the unexpected behavior clearly.
      placeholder: "I was editing chapter 3 and pressed Ctrl+S when..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "The manuscript should have saved without error."

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps that lead to the bug.
      placeholder: |
        1. Open Termina
        2. Create a new project
        3. ...
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: "e.g. macOS 14.2, Windows 11, Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Termina version
      description: "Found in Help > About or termina --version"
    validations:
      required: true

  - type: input
    id: ai-provider
    attributes:
      label: AI Provider
      description: "e.g. Claude, GPT-4, Ollama (local)"
      placeholder: "Claude 3.5 Sonnet via Anthropic API"

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant log output or attach screenshots.
      render: shell
